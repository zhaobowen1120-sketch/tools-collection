<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --accent: #007aff;
    --accent-hover: #0056cc;
    --border: #e5e5ea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--text-secondary);
    font-size: 1.05rem;
  }

  .card-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--border);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(0, 122, 255, 0.12);
    transform: translateY(-2px);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .card-icon.welding {
    background: #e8f5e9;
  }

  .card-icon.timer {
    background: #fff3e0;
  }

  .card-content h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .card-content p {
    color: var(--text-secondary);
    font-size: 0.9rem;
  }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔧 工具集</h1>
    <p>实用小工具合集</p>
  </header>

  <div class="card-grid">
    <a class="card" href="二保焊新手教程_从上电开始.html">
      <div class="card-icon welding">⚡</div>
      <div class="card-content">
        <h2>二保焊新手教程</h2>
        <p>从零开始的二保焊上手指南，涵盖设备接线、参数调节与基础操作</p>
      </div>
    </a>

    <a class="card" href="长按计时器.html">
      <div class="card-icon timer">⏱️</div>
      <div class="card-content">
        <h2>长按计时器</h2>
        <p>精确到 1 秒的长按计时工具，支持开始、暂停、重置</p>
      </div>
    </a>
  </div>

  <footer>
    <p>通过 GitHub Pages 发布</p>
  </footer>
</div>
</body>
</html>
